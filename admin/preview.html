<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Vista previa — Crono Play</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>

  <style>
    /* ── TOKENS (dark-first, aligned with noticia.html) ──────── */
    :root {
      --bg:        #070B12;
      --surface:   #0D1420;
      --card:      #111926;
      --border:    #1A2535;
      --border-hi: #243348;
      --orange:    #F5611A;
      --orange-hi: #FF7A38;
      --orange-dk: #C44A0E;
      --red:       #FF3232;
      --blue:      #0077CC;
      --blue-hi:   #0091E6;
      --green:     #10B981;
      --amber:     #F59E0B;
      --indigo:    #818CF8;
      --text:      #EEF2F7;
      --muted:     #6B8099;
      --muted-hi:  #8FA8C0;
      --font-d:    'Space Grotesk', system-ui, sans-serif;
      --font-b:    'Inter', system-ui, sans-serif;
      --r:         10px;
      --r-lg:      16px;
      --preview-bar-h: 52px;
    }

    /* ── LIGHT MODE ──────────────────────────────────────────── */
    [data-theme="light"] {
      --bg:        #F4F6F9;
      --surface:   #FFFFFF;
      --card:      #FFFFFF;
      --border:    #E2E8F0;
      --border-hi: #CBD5E1;
      --text:      #0F172A;
      --muted:     #64748B;
      --muted-hi:  #475569;
    }
    [data-theme="light"] .preview-bar { background: rgba(244,246,249,.82); color: var(--text); }
    [data-theme="light"] .preview-article-title { color: var(--muted); }
    [data-theme="light"] .preview-btn-close { background: rgba(0,0,0,.06); color: var(--text); }
    [data-theme="light"] .article-body blockquote { background: rgba(245,97,26,.06); }
    [data-theme="light"] .article-featured-img { background: var(--border); }
    [data-theme="light"] .tag-pill { background: rgba(0,119,204,.08); border-color: rgba(0,119,204,.18); }

    /* ── RESET ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-b); background: var(--bg); color: var(--text); line-height: 1.6; }
    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    :focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }

    /* ── PREVIEW BAR (glassmorphism) ─────────────────────────── */
    .preview-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--preview-bar-h);
      background: rgba(7,11,18,.82);
      backdrop-filter: blur(12px) saturate(1.4);
      -webkit-backdrop-filter: blur(12px) saturate(1.4);
      color: #EEF2F7;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.25rem; gap: 1rem;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,.18);
      font-family: var(--font-b); font-size: 0.8rem;
    }
    .preview-bar-left  { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }
    .preview-bar-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }

    .preview-label {
      font-family: var(--font-d); font-size: 0.65rem; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--orange); color: white;
      padding: 0.2rem 0.65rem; border-radius: 6px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(245,97,26,.3);
    }

    .preview-status {
      font-family: var(--font-d); font-size: 0.65rem; font-weight: 700;
      padding: 0.2rem 0.65rem; border-radius: 6px; flex-shrink: 0;
      letter-spacing: .03em; text-transform: uppercase;
    }
    .preview-status.draft       { background: rgba(107,128,153,.15); color: var(--muted-hi); }
    .preview-status.review      { background: rgba(245,158,11,.15);  color: var(--amber); }
    .preview-status.published   { background: rgba(16,185,129,.15);  color: var(--green); }
    .preview-status.rejected    { background: rgba(255,50,50,.15);   color: var(--red); }
    .preview-status.unpublished { background: rgba(129,140,248,.15); color: var(--indigo); }

    .preview-article-title {
      color: var(--muted-hi); font-size: 0.8rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .preview-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.9rem; border-radius: 8px;
      font-family: var(--font-d); font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      cursor: pointer; border: none;
      transition: background .18s, transform .12s, box-shadow .18s;
    }
    .preview-btn:hover { transform: translateY(-1px); }
    .preview-btn:active { transform: scale(.97); }
    .preview-btn-edit {
      background: var(--orange); color: white;
      box-shadow: 0 2px 10px rgba(245,97,26,.3);
    }
    .preview-btn-edit:hover { background: var(--orange-hi); box-shadow: 0 4px 16px rgba(245,97,26,.4); }
    .preview-btn-close { background: rgba(255,255,255,.08); color: #EEF2F7; }
    .preview-btn-close:hover { background: rgba(255,255,255,.14); }
    .preview-btn svg { width: 13px; height: 13px; }

    /* ── ARTICLE CONTENT (matches noticia.html) ──────────────── */
    .article-wrap {
      max-width: 720px; margin: 0 auto;
      padding: calc(var(--preview-bar-h) + 32px) 24px 80px;
    }

    .article-category {
      display: inline-flex; align-items: center;
      padding: 4px 12px; border-radius: 6px;
      font-family: var(--font-d); font-size: 10.5px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .1em;
      color: #fff; background: var(--orange);
      margin-bottom: 16px;
    }
    .article-category.cat-deportes { background: var(--orange); }
    .article-category.cat-noticias { background: var(--blue); }
    .article-category.cat-entretenimiento { background: #8B5CF6; }
    .article-category.cat-opinion { background: var(--green); }
    .article-category.cat-internacional { background: var(--blue-hi); }
    .article-category.cat-tecnologia { background: #6366F1; }

    .article-title {
      font-family: var(--font-d); font-weight: 800;
      font-size: clamp(1.8rem, 4.5vw, 2.6rem);
      line-height: 1.1; letter-spacing: -.02em;
      margin-bottom: 16px; color: var(--text);
    }

    .article-excerpt {
      font-size: 1.05rem; color: var(--muted);
      line-height: 1.65; margin-bottom: 24px;
      border-left: 3px solid var(--orange);
      padding-left: 16px;
    }

    .article-meta {
      display: flex; align-items: center; gap: 12px;
      font-size: 13px; color: var(--muted);
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px; flex-wrap: wrap;
    }
    .article-meta-sep { opacity: 0.35; }
    .article-meta-author { font-weight: 600; color: var(--text); }

    .article-featured-img {
      width: 100%; height: auto; border-radius: var(--r-lg);
      margin-bottom: 40px; display: block;
      max-height: 640px; object-fit: cover;
      background: var(--card);
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
    }

    /* ── ARTICLE BODY TYPOGRAPHY ─────────────────────────────── */
    .article-body { font-size: 1rem; line-height: 1.85; color: var(--text); }
    .article-body h2 {
      font-family: var(--font-d); font-size: 1.4rem; font-weight: 700;
      margin: 2.5rem 0 .75rem; color: var(--text);
    }
    .article-body h3 {
      font-family: var(--font-d); font-size: 1.15rem; font-weight: 700;
      margin: 2rem 0 .5rem; color: var(--text);
    }
    .article-body p  { margin-bottom: 1.25rem; }
    .article-body ul, .article-body ol { margin: 0 0 1.25rem 1.5rem; list-style: revert; }
    .article-body li { margin-bottom: 0.4rem; }
    .article-body strong { font-weight: 600; color: var(--text); }
    .article-body em { font-style: italic; }
    .article-body a {
      color: var(--blue); text-decoration: underline;
      text-underline-offset: 3px; transition: color .15s;
    }
    .article-body a:hover { color: var(--orange); }
    .article-body blockquote {
      border-left: 3px solid var(--orange);
      padding: .75rem 1.25rem; margin: 1.5rem 0;
      background: rgba(245,97,26,.06); border-radius: 0 8px 8px 0;
      color: var(--muted); font-style: italic;
    }
    .article-body img {
      border-radius: var(--r); margin: 1.5rem auto;
      max-width: 100%; height: auto; display: block;
    }

    /* ── TAGS ─────────────────────────────────────────────────── */
    .article-tags {
      margin-top: 40px; padding-top: 24px;
      border-top: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    }
    .tags-label {
      font-family: var(--font-d); font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted); margin-right: 4px;
    }
    .tag-pill {
      padding: 4px 12px; border-radius: 6px;
      font-family: var(--font-d); font-size: 11px; font-weight: 600;
      background: rgba(0,119,204,.1); border: 1px solid rgba(0,119,204,.2);
      color: var(--blue); transition: background .15s, border-color .15s;
    }
    .tag-pill:hover { background: rgba(0,119,204,.18); border-color: rgba(0,119,204,.35); }

    /* ── LOADING / ERROR STATES ──────────────────────────────── */
    .state-center {
      padding: 120px 24px 80px; text-align: center; color: var(--muted);
      max-width: 480px; margin: 0 auto;
    }
    .state-center svg { width: 48px; height: 48px; margin: 0 auto 20px; opacity: 0.3; color: var(--muted); }
    .state-center h2 {
      font-family: var(--font-d); font-size: 1.3rem; font-weight: 700;
      margin-bottom: 8px; color: var(--text);
    }
    .state-center p { font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-back {
      display: inline-flex; align-items: center; gap: 0.4rem;
      margin-top: 1.25rem; padding: 0.55rem 1.25rem;
      background: var(--orange); border-radius: 8px;
      color: white; font-family: var(--font-d); font-weight: 700;
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em;
      transition: background .18s, transform .12s, box-shadow .18s;
      box-shadow: 0 2px 10px rgba(245,97,26,.3);
      border: none; cursor: pointer;
    }
    .btn-back:hover { background: var(--orange-hi); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,97,26,.4); }

    /* ── EMBEDS ───────────────────────────────────────────────── */
    .social-embed { margin: 1.5rem auto; max-width: 540px; text-align: center; }
    .social-embed a { color: var(--blue); }
    .instagram-media, .tiktok-embed { margin: 1.5rem auto !important; }
    .embed-tweet { max-width: 550px; margin: 1.5rem auto; background: transparent; }
    .embed-tweet iframe { width: 100%; min-height: 250px; border: none; border-radius: 12px; transition: height 0.3s ease; }
    .embed-responsive {
      position: relative; padding-bottom: 56.25%; height: 0;
      overflow: hidden; max-width: 100%; margin: 1.5rem auto;
      border-radius: var(--r);
    }
    .embed-responsive iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: none;
    }
    .embed-video { max-width: 100%; margin: 1.5rem auto; }
    .embed-video video { width: 100%; border-radius: var(--r); background: #000; max-height: 70vh; display: block; }

    /* ── RESPONSIVE ───────────────────────────────────────────── */
    @media (max-width: 768px) {
      .article-wrap { padding: calc(var(--preview-bar-h) + 24px) 20px 64px; }
      .article-title { font-size: clamp(1.5rem, 5vw, 2rem); }
      .preview-article-title { display: none; }
    }
    @media (max-width: 480px) {
      .article-meta { font-size: 12px; gap: 8px; }
      .preview-bar { padding: 0 0.75rem; gap: 0.5rem; }
      .preview-btn { padding: 0.35rem 0.65rem; font-size: 0.65rem; }
    }
  </style>
  <script>(function(){ var t=localStorage.getItem('crono-theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })();</script>
</head>
<body>

  
  <div class="preview-bar" id="previewBar">
    <div class="preview-bar-left">
      <span class="preview-label">Vista previa</span>
      <span class="preview-status" id="previewStatusBadge"></span>
      <span class="preview-article-title" id="previewBarTitle">Cargando...</span>
    </div>
    <div class="preview-bar-right">
      <a class="preview-btn preview-btn-edit" id="btnEditFromPreview" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Editar
      </a>
      <button class="preview-btn preview-btn-close" onclick="window.close()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Cerrar
      </button>
    </div>
  </div>

  <div id="appRoot">
    <div class="state-center">
      <div class="spinner"></div>
      <p>Cargando vista previa...</p>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { doc, getDoc }        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const params    = new URLSearchParams(window.location.search);
    const articleId = params.get('id');

    if (!articleId) { renderError('No se especificó un artículo.'); }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.replace('index.html'); return; }

      try {
        
        const userSnap = await getDoc(doc(db, 'users', user.uid));
        if (!userSnap.exists() || !userSnap.data().active) {
          window.location.replace('index.html'); return;
        }
        const currentUser = { uid: user.uid, ...userSnap.data() };
        const isAdmin     = ['super_admin', 'editor_jefe'].includes(currentUser.role);

        
        const artSnap = await getDoc(doc(db, 'articles', articleId));
        if (!artSnap.exists()) { renderNotFound(); return; }

        const article = { id: artSnap.id, ...artSnap.data() };

        
        if (!isAdmin && article.author_uid !== currentUser.uid) {
          renderAccessDenied(); return;
        }

        renderArticle(article);

      } catch (err) {
        console.error(err);
        renderError('Error al cargar la vista previa.');
      }
    });

    function renderArticle(a) {
      
      document.getElementById('previewBarTitle').textContent = a.title || 'Sin título';
      document.getElementById('btnEditFromPreview').href     = `editor.html?id=${a.id}`;
      const badge = document.getElementById('previewStatusBadge');
      badge.textContent  = formatStatus(a.status);
      badge.className    = `preview-status ${a.status}`;

      const safeBody = DOMPurify.sanitize(a.body || '', {
        ALLOWED_TAGS: ['p','br','h2','h3','strong','em','u','ul','ol','li','a','blockquote','img'],
        ALLOWED_ATTR: ['href','src','alt','title','target','rel'],
        ADD_TAGS: ['div', 'span', 'iframe', 'video', 'source'],
        ADD_ATTR: ['class', 'data-provider', 'data-url', 'allow', 'allowfullscreen', 'frameborder', 'loading', 'controls', 'preload', 'playsinline', 'type', 'scrolling', 'allowtransparency'],
      });

      const imgHtml = a.featured_image
        ? `<img class="article-featured-img" src="${esc(transformImg(a.featured_image))}" alt="${esc(a.title)}" loading="eager">`
        : '';

      const tagsHtml = a.tags?.length
        ? `<div class="article-tags">
             <span class="tags-label">Etiquetas:</span>
             ${a.tags.map(t => `<span class="tag-pill">${esc(t)}</span>`).join('')}
           </div>`
        : '';

      document.title = `[Vista previa] ${a.title || 'Sin título'} — Crono Play`;

      const catClass = getCatClass(a.category);

      document.getElementById('appRoot').innerHTML = `
        <div class="article-wrap">
          <span class="article-category ${catClass}">${esc(formatCat(a.category))}</span>
          <h1 class="article-title">${esc(a.title)}</h1>
          ${a.excerpt ? `<p class="article-excerpt">${esc(a.excerpt)}</p>` : ''}
          <div class="article-meta">
            <span class="article-meta-author">${esc(a.author_name || 'Redacción')}</span>
            <span class="article-meta-sep">·</span>
            <span>${formatDate(a.updated_at)}</span>
            <span class="article-meta-sep">·</span>
            <span>${esc(formatCat(a.category))}</span>
          </div>
          ${imgHtml}
          <div class="article-body">${safeBody}</div>
          ${tagsHtml}
        </div>`;

      document.querySelectorAll('.article-body iframe').forEach(iframe => {
        const src = iframe.getAttribute('src') || '';
        const isYouTube = src.startsWith('https://www.youtube.com/embed/');
        const isTwitter = src.startsWith('https://platform.twitter.com/embed/');
        if (!isYouTube && !isTwitter) iframe.remove();
      });

      
      hydrateEmbeds(document.querySelector('.article-body'));
    }

    function renderNotFound() {
      document.getElementById('appRoot').innerHTML = `
        <div class="state-center">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <h2>Artículo no encontrado</h2>
          <p>El artículo no existe o fue eliminado.</p>
          <button class="btn-back" onclick="window.close()">Cerrar</button>
        </div>`;
    }

    function renderAccessDenied() {
      document.getElementById('appRoot').innerHTML = `
        <div class="state-center">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <h2>Acceso denegado</h2>
          <p>No tienes permiso para ver esta vista previa.</p>
          <button class="btn-back" onclick="window.close()">Cerrar</button>
        </div>`;
    }

    function renderError(msg) {
      document.getElementById('appRoot').innerHTML = `
        <div class="state-center">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <h2>Error</h2>
          <p>${esc(msg)}</p>
          <button class="btn-back" onclick="window.close()">Cerrar</button>
        </div>`;
    }

    function transformImg(url) {
      if (!url) return '';
      let u = String(url).trim();
      if (u.startsWith('http://')) u = u.replace('http://', 'https://');
      if (u.includes('cloudinary.com') && u.includes('/upload/'))
        return u.replace('/upload/', '/upload/w_1200,q_auto,f_auto/');
      return u;
    }
    function formatDate(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('es-VE', { day:'2-digit', month:'long', year:'numeric' });
    }
    function formatCat(c) {
      return { deportes:'Deportes', noticias:'Noticias', entretenimiento:'Entretenimiento', opinion:'Opinión', internacional:'Internacional', tecnologia:'Tecnología', 'tecnología':'Tecnología' }[c] || c || 'General';
    }
    function formatStatus(s) {
      return { draft:'Borrador', review:'En revisión', published:'Publicado', rejected:'Rechazado', unpublished:'Despublicado' }[s] || s;
    }
    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function getCatClass(c) {
      const map = {
        deportes:'cat-deportes', noticias:'cat-noticias',
        entretenimiento:'cat-entretenimiento', opinion:'cat-opinion',
        internacional:'cat-internacional', tecnologia:'cat-tecnologia',
        'tecnología':'cat-tecnologia'
      };
      return map[(c||'').toLowerCase()] || '';
    }

    
    const EMBED_PROVIDERS = {
      instagram: {
        scriptUrl: 'https://www.instagram.com/embed.js',
        createEmbed(url) {
          const bq = document.createElement('blockquote');
          bq.className = 'instagram-media';
          bq.setAttribute('data-instgrm-permalink', url);
          bq.setAttribute('data-instgrm-version', '14');
          bq.style.cssText = 'max-width:540px;width:100%;margin:1rem auto;min-width:326px;';
          bq.innerHTML = `<a href="${url}" target="_blank" rel="noopener noreferrer">Ver en Instagram</a>`;
          return bq;
        },
        onLoad() { if (window.instgrm) window.instgrm.Embeds.process(); }
      },
      twitter: {
        scriptUrl: null,
        createEmbed(url) {
          const match = url.match(/status\/(\d+)/);
          if (!match) return null;
          const tweetId = match[1];
          const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
          const wrapper = document.createElement('div');
          wrapper.className = 'embed-responsive embed-tweet';
          wrapper.style.cssText = 'max-width:550px; margin:1.5rem auto;';
          const iframe = document.createElement('iframe');
          iframe.src = `https://platform.twitter.com/embed/Tweet.html?id=${tweetId}&theme=${theme}`;
          iframe.setAttribute('frameborder', '0');
          iframe.setAttribute('scrolling', 'no');
          iframe.setAttribute('allowtransparency', 'true');
          iframe.setAttribute('allowfullscreen', 'true');
          iframe.setAttribute('id', `tweet-${tweetId}`);
          iframe.style.cssText = 'width:100%; min-height:250px; border:none; border-radius:12px;';
          wrapper.appendChild(iframe);
          const fallback = document.createElement('p');
          fallback.style.cssText = 'text-align:center; margin-top:0.5rem; font-size:0.8rem;';
          fallback.innerHTML = `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:var(--color-accent, #F5611A);">Ver post en X</a>`;
          wrapper.appendChild(fallback);
          return wrapper;
        },
        onLoad() {}
      },
      youtube: {
        scriptUrl: null,
        createEmbed(url) {
          const videoId = extractYouTubeId(url);
          if (!videoId || !/^[\w-]{11}$/.test(videoId)) return null;
          const wrapper = document.createElement('div');
          wrapper.className = 'embed-responsive';
          wrapper.style.cssText = 'position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;margin:1rem auto;';
          const iframe = document.createElement('iframe');
          iframe.src = `https://www.youtube.com/embed/${videoId}`;
          iframe.setAttribute('loading', 'lazy');
          iframe.setAttribute('allow', 'accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture');
          iframe.setAttribute('allowfullscreen', '');
          iframe.setAttribute('frameborder', '0');
          iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';
          wrapper.appendChild(iframe);
          return wrapper;
        },
        onLoad() {}
      },
      tiktok: {
        scriptUrl: 'https://www.tiktok.com/embed.js',
        createEmbed(url) {
          const match = url.match(/video\/(\d+)/);
          const videoId = match ? match[1] : '';
          const bq = document.createElement('blockquote');
          bq.className = 'tiktok-embed';
          bq.setAttribute('cite', url);
          if (videoId) bq.setAttribute('data-video-id', videoId);
          bq.style.cssText = 'max-width:605px;min-width:325px;margin:1rem auto;';
          bq.innerHTML = `<a href="${url}" target="_blank" rel="noopener noreferrer">Ver en TikTok</a>`;
          return bq;
        },
        onLoad() {}
      },
      video: {
        scriptUrl: null,
        createEmbed(url) {
          const wrapper = document.createElement('div');
          wrapper.className = 'embed-responsive embed-video';
          wrapper.style.cssText = 'max-width:100%; margin:1.5rem auto;';
          const video = document.createElement('video');
          video.setAttribute('controls', '');
          video.setAttribute('preload', 'metadata');
          video.setAttribute('playsinline', '');
          video.style.cssText = 'width:100%; border-radius:8px; background:#000;';
          const source = document.createElement('source');
          source.src = url;
          if (url.match(/\.webm(\?|$)/i)) {
            source.type = 'video/webm';
          } else {
            source.type = 'video/mp4';
          }
          video.appendChild(source);
          const fallback = document.createElement('p');
          fallback.innerHTML = `Tu navegador no soporta este video. <a href="${url}" target="_blank" rel="noopener noreferrer">Descárgalo aquí</a>.`;
          video.appendChild(fallback);
          wrapper.appendChild(video);
          return wrapper;
        },
        onLoad() {}
      }
    };

    function extractYouTubeId(url) {
      for (const p of [/youtube\.com\/watch\?v=([\w-]+)/, /youtu\.be\/([\w-]+)/, /youtube\.com\/shorts\/([\w-]+)/, /youtube\.com\/embed\/([\w-]+)/]) {
        const m = url.match(p);
        if (m) return m[1];
      }
      return null;
    }

    const _loadedScripts = new Set();
    function loadScript(url) {
      return new Promise((resolve, reject) => {
        if (_loadedScripts.has(url)) { resolve(); return; }
        const s = document.createElement('script');
        s.src = url; s.async = true;
        s.onload = () => { _loadedScripts.add(url); resolve(); };
        s.onerror = reject;
        document.body.appendChild(s);
      });
    }

    async function hydrateEmbeds(container) {
      if (!container) return;
      const placeholders = container.querySelectorAll('.social-embed[data-provider][data-url]');
      if (!placeholders.length) return;

      const scriptsToLoad = new Map();

      placeholders.forEach(placeholder => {
        const provider = placeholder.getAttribute('data-provider');
        const url = placeholder.getAttribute('data-url');
        const config = EMBED_PROVIDERS[provider];

        if (!config) {
          placeholder.innerHTML = `<p style="text-align:center;padding:1rem;"><a href="${url}" target="_blank" rel="noopener noreferrer">Ver contenido en ${provider}</a></p>`;
          return;
        }

        const embed = config.createEmbed(url);
        if (embed) {
          placeholder.replaceWith(embed);
          if (config.scriptUrl) scriptsToLoad.set(provider, config);
        }
      });

      for (const [provider, config] of scriptsToLoad) {
        try {
          await loadScript(config.scriptUrl);
          config.onLoad();
        } catch (err) {
          console.warn(`Error cargando script de embed (${provider}):`, err);
        }
      }

    }

    
    window.addEventListener('message', function(event) {
      if (event.origin !== 'https://platform.twitter.com') return;
      try {
        const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        if (data['twttr.embed'] && data['twttr.embed'].method === 'twttr.private.resize') {
          const params = data['twttr.embed'].params;
          if (params && params.length > 0) {
            const height = params[0].height;
            document.querySelectorAll('.embed-tweet iframe').forEach(iframe => {
              if (height && height > 0) iframe.style.height = height + 'px';
            });
          }
        }
      } catch (e) {  }
    });
  </script>
</body>
</html>
