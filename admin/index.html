<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Acceso al Panel — Crono Sport Media</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

  <style>
    /* ─── Variables de marca ──────────────────────────────── */
    :root {
      --color-primary:    #0D1B2A;
      --color-secondary:  #1B2D45;
      --color-accent:     #FF6B35;
      --color-accent-alt: #00D4FF;
      --color-text:       #F0F0F0;
      --color-text-muted: #A0AEC0;
      --color-success:    #10B981;
      --color-error:      #EF4444;

      --font-heading: 'Montserrat', sans-serif;
      --font-body:    'Inter', sans-serif;

      --radius-base: 8px;
      --radius-lg:   12px;
      --transition:  0.2s ease;
    }

    /* ─── Reset y base ───────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--color-text);
      background-color: var(--color-primary);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;

      /* Fondo con gradiente sutil */
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0, 212, 255, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 107, 53, 0.05) 0%, transparent 50%);
    }

    /* ─── Contenedor del login ───────────────────────────── */
    .login-wrapper {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ─── Cabecera / branding ────────────────────────────── */
    .login-header {
      text-align: center;
    }

    .login-logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: var(--color-accent);
      border-radius: 14px;
      margin-bottom: 1rem;
    }

    .login-logo-mark svg {
      width: 30px;
      height: 30px;
      fill: white;
    }

    .login-brand {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--color-text);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .login-brand span {
      color: var(--color-accent);
    }

    .login-subtitle {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-top: 0.35rem;
    }

    /* ─── Card de formulario ─────────────────────────────── */
    .login-card {
      background: var(--color-secondary);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.4),
        0 1px 0 rgba(255, 255, 255, 0.05) inset;
    }

    .login-card-title {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.25rem;
      margin-bottom: 0.25rem;
    }

    .login-card-desc {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-bottom: 1.75rem;
    }

    /* ─── Campos del formulario ──────────────────────────── */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--color-text-muted);
      margin-bottom: 0.5rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--color-primary);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-base);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 1rem;
      transition: border-color var(--transition), box-shadow var(--transition);
      -webkit-appearance: none;
      appearance: none;
      outline: none;
    }

    .form-input::placeholder {
      color: rgba(160, 174, 192, 0.5);
    }

    .form-input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.15);
    }

    .form-input.input-error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    }

    /* ─── Botón submit ───────────────────────────────────── */
    .btn-submit {
      width: 100%;
      padding: 0.85rem 1.5rem;
      background: var(--color-accent);
      border: none;
      border-radius: var(--radius-base);
      color: white;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), opacity var(--transition);
      margin-top: 0.5rem;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .btn-submit:hover:not(:disabled) {
      background: #e85d2a;
      transform: translateY(-1px);
    }

    .btn-submit:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ─── Spinner de carga ───────────────────────────────── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-submit.loading .spinner {
      display: block;
    }

    .btn-submit.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── Mensajes de error / estado ────────────────────── */
    .alert {
      display: none;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      border-radius: var(--radius-base);
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      animation: fadeIn 0.2s ease;
    }

    .alert.visible {
      display: flex;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .alert-icon {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      margin-top: 1px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Footer del login ───────────────────────────────── */
    .login-footer {
      text-align: center;
      font-size: 0.8rem;
      color: var(--color-text-muted);
    }

    .login-footer a {
      color: var(--color-accent-alt);
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    /* ─── Responsive mínimo ──────────────────────────────── */
    @media (max-width: 480px) {
      .login-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>

<body>

  <main class="login-wrapper" role="main">

    <!-- Branding -->
    <header class="login-header">
      <div class="login-logo-mark" aria-hidden="true">
        <!-- Ícono simplificado de cronómetro / play -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2a9 9 0 1 0 0 18A9 9 0 0 0 12 2zm0 16a7 7 0 1 1 0-14 7 7 0 0 1 0 14zm-1-10.5v5l4-2.5-4-2.5z"/>
        </svg>
      </div>
      <p class="login-brand">Crono <span>Sport</span> Media</p>
      <p class="login-subtitle">Panel de Administración</p>
    </header>

    <!-- Tarjeta de login -->
    <section class="login-card">
      <h1 class="login-card-title">Accede a tu cuenta</h1>
      <p class="login-card-desc">Ingresa tus credenciales para continuar.</p>

      <!-- Alerta de error -->
      <div class="alert alert-error" id="alertError" role="alert" aria-live="polite">
        <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="alertErrorMsg">Credenciales incorrectas. Verifica tu email y contraseña.</span>
      </div>

      <!-- Formulario -->
      <form id="loginForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="email">Correo electrónico</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="tu@email.com"
            autocomplete="email"
            inputmode="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••••••"
            autocomplete="current-password"
            required
          >
        </div>

        <button class="btn-submit" type="submit" id="btnSubmit">
          <div class="spinner" aria-hidden="true"></div>
          <span class="btn-text">Ingresar</span>
        </button>

      </form>
    </section>

    <!-- Pie de página -->
    <footer class="login-footer">
      <p>¿Olvidaste tu contraseña? <a href="mailto:cronossportmedia@gmail.com">Contacta al administrador</a></p>
    </footer>

  </main>

  <!-- ─── Firebase SDK (modular) ───────────────────────────── -->
  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ── Importar configuración desde el módulo centralizado ──
    // NOTA: Este import requiere que js/firebase-config.js esté completo
    // con los datos reales del proyecto Firebase.
    // Ruta relativa desde admin/ hacia js/
    import { auth, db } from "../js/firebase-config.js";

    // ─── Elementos del DOM ────────────────────────────────────
    const form        = document.getElementById("loginForm");
    const emailInput  = document.getElementById("email");
    const passInput   = document.getElementById("password");
    const btnSubmit   = document.getElementById("btnSubmit");
    const alertError  = document.getElementById("alertError");
    const alertErrMsg = document.getElementById("alertErrorMsg");

    // ─── Si ya hay sesión activa, redirigir directamente ─────
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // Hay sesión en Firebase Auth — verificar que el usuario
        // existe en Firestore y está activo antes de redirigir
        const valid = await validateUserInFirestore(user.uid);
        if (valid) {
          redirectToDashboard();
        } else {
          // Existe en Auth pero no en Firestore (o está inactivo) → cerrar sesión
          await auth.signOut();
        }
      }
    });

    // ─── Submit del formulario ────────────────────────────────
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();

      const email    = emailInput.value.trim();
      const password = passInput.value;

      // Validación básica antes de ir a Firebase
      if (!email || !password) {
        showError("Completa todos los campos antes de continuar.");
        return;
      }

      setLoading(true);

      try {
        // 1. Autenticar contra Firebase Auth
        const credential = await signInWithEmailAndPassword(auth, email, password);
        const uid = credential.user.uid;

        // 2. Verificar que el usuario existe en Firestore y está activo
        const valid = await validateUserInFirestore(uid);

        if (!valid) {
          // Cuenta desactivada o no existe en Firestore
          await auth.signOut();
          showError("Tu cuenta no tiene acceso al panel. Contacta al administrador.");
          return;
        }

        // 3. Login exitoso → ir al dashboard
        redirectToDashboard();

      } catch (err) {
        // Manejar errores de Firebase Auth
        showError(translateFirebaseError(err.code));
      } finally {
        setLoading(false);
      }
    });

    // ─── Verificar usuario en Firestore ──────────────────────
    async function validateUserInFirestore(uid) {
      try {
        const userDoc = await getDoc(doc(db, "users", uid));
        if (!userDoc.exists()) return false;
        const data = userDoc.data();
        // El usuario debe existir y tener active === true
        return data.active === true;
      } catch {
        // Si hay error al leer Firestore (ej. rules bloquean), denegar
        return false;
      }
    }

    // ─── Redirigir al dashboard ───────────────────────────────
    function redirectToDashboard() {
      window.location.replace("dashboard.html");
    }

    // ─── Estado de carga ──────────────────────────────────────
    function setLoading(isLoading) {
      btnSubmit.disabled = isLoading;
      btnSubmit.classList.toggle("loading", isLoading);
      emailInput.disabled = isLoading;
      passInput.disabled  = isLoading;
    }

    // ─── Mostrar y ocultar error ──────────────────────────────
    function showError(message) {
      alertErrMsg.textContent = message;
      alertError.classList.add("visible");
      emailInput.classList.add("input-error");
      passInput.classList.add("input-error");
    }

    function clearError() {
      alertError.classList.remove("visible");
      emailInput.classList.remove("input-error");
      passInput.classList.remove("input-error");
    }

    // Limpiar error cuando el usuario empieza a escribir de nuevo
    [emailInput, passInput].forEach(input => {
      input.addEventListener("input", clearError);
    });

    // ─── Traducir códigos de error de Firebase ────────────────
    function translateFirebaseError(code) {
      const errors = {
        "auth/invalid-email":         "El correo electrónico no tiene un formato válido.",
        "auth/user-disabled":         "Esta cuenta fue deshabilitada. Contacta al administrador.",
        "auth/user-not-found":        "No encontramos una cuenta con ese correo.",
        "auth/wrong-password":        "La contraseña es incorrecta. Inténtalo de nuevo.",
        "auth/invalid-credential":    "Credenciales incorrectas. Verifica tu email y contraseña.",
        "auth/too-many-requests":     "Demasiados intentos fallidos. Espera unos minutos e intenta de nuevo.",
        "auth/network-request-failed":"Error de conexión. Verifica tu conexión a internet.",
        "auth/operation-not-allowed": "Este método de login no está habilitado. Contacta al administrador.",
      };
      return errors[code] || "Ocurrió un error al intentar ingresar. Inténtalo de nuevo.";
    }
  </script>

</body>
</html>
