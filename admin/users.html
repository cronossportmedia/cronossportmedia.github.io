<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Usuarios — Crono Sport Media Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-bg:           #F5F7FA;
      --color-surface:      #FFFFFF;
      --color-surface-2:    #EEF0F5;
      --color-border:       rgba(0, 0, 0, 0.07);
      --color-accent:       #FF6B35;
      --color-accent-alt:   #0077CC;
      --color-text:         #1A202C;
      --color-muted:        #718096;
      --color-success:      #10B981;
      --color-error:        #EF4444;
      --font-heading:       'Montserrat', sans-serif;
      --font-body:          'Inter', sans-serif;
      --radius:             8px;
      --radius-lg:          12px;
      --sidebar-w:          240px;
      --transition:         0.18s ease;
    }

    [data-theme="dark"] {
      --color-bg:           #0D1B2A;
      --color-surface:      #1B2D45;
      --color-surface-2:    #162338;
      --color-border:       rgba(255, 255, 255, 0.07);
      --color-accent:       #FF6B35;
      --color-accent-alt:   #00D4FF;
      --color-text:         #F0F0F0;
      --color-muted:        #A0AEC0;
      --color-success:      #10B981;
      --color-error:        #EF4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: var(--font-body); background: var(--color-bg); color: var(--color-text); font-size: 0.9375rem; line-height: 1.6; }
    button { cursor: pointer; font-family: inherit; }
    a { text-decoration: none; color: inherit; }

    .app { display: flex; min-height: 100vh; }

    .sidebar { width: var(--sidebar-w); background: var(--color-surface-2); border-right: 1px solid var(--color-border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; transition: transform var(--transition); }
    .sidebar-brand { padding: 1.25rem 1.25rem 1rem; border-bottom: 1px solid var(--color-border); }
    .sidebar-brand-name { font-family: var(--font-heading); font-size: 0.8rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
    .sidebar-brand-name span { color: var(--color-accent); }
    .sidebar-brand-sub { font-size: 0.7rem; color: var(--color-muted); margin-top: 0.15rem; }
    .sidebar-nav { flex: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 0.25rem; }
    .nav-section-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-muted); padding: 0.5rem 0.5rem 0.25rem; margin-top: 0.5rem; }
    .nav-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.6rem 0.75rem; border-radius: var(--radius); font-size: 0.875rem; font-weight: 500; color: var(--color-muted); transition: background var(--transition), color var(--transition); border: none; background: none; width: 100%; text-align: left; }
    .nav-item:hover { background: rgba(0,0,0,0.04); color: var(--color-text); }
    .nav-item.active { background: rgba(255,107,53,0.12); color: var(--color-accent); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 1rem 0.75rem; border-top: 1px solid var(--color-border); }
    .user-info { display: flex; align-items: center; gap: 0.65rem; padding: 0.5rem; margin-bottom: 0.5rem; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--color-accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-weight: 800; font-size: 0.75rem; color: white; flex-shrink: 0; }
    .user-name { font-size: 0.8rem; font-weight: 600; }
    .user-role { font-size: 0.7rem; color: var(--color-muted); }
    .btn-logout { width: 100%; padding: 0.5rem 0.75rem; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius); color: #fca5a5; font-size: 0.8rem; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: background var(--transition); }
    .btn-logout:hover { background: rgba(239,68,68,0.2); }
    .btn-logout svg { width: 14px; height: 14px; }

    .main { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { background: var(--color-surface-2); border-bottom: 1px solid var(--color-border); padding: 0.85rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-family: var(--font-heading); font-weight: 700; font-size: 1.1rem; }
    .page-body { padding: 1.5rem; flex: 1; }

    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.1rem; border-radius: var(--radius); font-family: var(--font-heading); font-weight: 700; font-size: 0.78rem; letter-spacing: 0.03em; text-transform: uppercase; border: none; transition: all var(--transition); min-height: 36px; cursor: pointer; }
    .btn-primary { background: var(--color-accent); color: white; }
    .btn-primary:hover { background: #e85d2a; transform: translateY(-1px); }
    .btn-ghost { background: transparent; border: 1px solid var(--color-border); color: var(--color-muted); }
    .btn-ghost:hover { color: var(--color-text); border-color: rgba(255,255,255,0.2); }
    .btn svg { width: 13px; height: 13px; }
    .btn-spinner { width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .btn.loading .btn-spinner { display: block; }
    .btn.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .table-wrap { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; }
    .table-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--color-border); display: flex; align-items: center; justify-content: space-between; }
    .table-header-title { font-weight: 600; font-size: 0.9rem; }

    .user-row { display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 1rem; padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--color-border); transition: background var(--transition); }
    .user-row:last-child { border-bottom: none; }
    .user-row:hover { background: rgba(0,0,0,0.02); }

    .user-row-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--color-accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-weight: 800; font-size: 0.8rem; color: white; flex-shrink: 0; }
    .user-row-name  { font-weight: 600; font-size: 0.875rem; }
    .user-row-email { font-size: 0.75rem; color: var(--color-muted); }

    .role-badge { display: inline-flex; align-items: center; padding: 0.2rem 0.65rem; border-radius: 99px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
    .role-super_admin  { color: var(--color-accent);     background: rgba(255,107,53,0.12); }
    .role-editor_jefe  { color: var(--color-accent-alt); background: rgba(0,212,255,0.12); }
    .role-reportero    { color: #a78bfa;                 background: rgba(167,139,250,0.12); }
    .role-colaborador  { color: var(--color-muted);      background: rgba(160,174,192,0.12); }

    .active-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .active-dot.on  { background: var(--color-success); box-shadow: 0 0 0 2px rgba(16,185,129,0.2); }
    .active-dot.off { background: var(--color-muted); }

    .row-actions { display: flex; align-items: center; gap: 0.35rem; }
    .action-btn { width: 30px; height: 30px; border-radius: var(--radius); border: 1px solid var(--color-border); background: transparent; color: var(--color-muted); display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
    .action-btn svg { width: 13px; height: 13px; }
    .action-btn:hover       { color: var(--color-text); border-color: rgba(255,255,255,0.2); background: rgba(0,0,0,0.04); }
    .action-btn.danger:hover { color: #fca5a5; border-color: rgba(239,68,68,0.4); }
    .action-btn.warn:hover   { color: #fde68a; border-color: rgba(245,158,11,0.4); }

    .loading-state { padding: 3rem; text-align: center; color: var(--color-muted); }
    .loading-spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--color-accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 420px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
    .modal-title { font-family: var(--font-heading); font-weight: 700; font-size: 1rem; margin-bottom: 1.25rem; }
    .field-group { margin-bottom: 1rem; }
    .field-label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--color-muted); margin-bottom: 0.45rem; }
    .field-label .required { color: var(--color-accent); }
    .field-input, .field-select { width: 100%; padding: 0.7rem 0.9rem; background: var(--color-bg); border: 1.5px solid var(--color-border); border-radius: var(--radius); color: var(--color-text); font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color var(--transition); -webkit-appearance: none; }
    .field-input:focus, .field-select:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(255,107,53,0.12); }
    .field-error { font-size: 0.75rem; color: var(--color-error); display: none; margin-top: 0.25rem; }
    .field-error.visible { display: block; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-full-modal { padding: 0.55rem 1.25rem; }

    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.75rem 1.25rem; border-radius: var(--radius); font-size: 0.875rem; font-weight: 500; display: none; align-items: center; gap: 0.5rem; z-index: 300; max-width: 320px; }
    .toast.show { display: flex; animation: slideUp 0.2s ease; }
    .toast.success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    .toast.error   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }
    @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .mobile-header { display: none; background: var(--color-surface-2); border-bottom: 1px solid var(--color-border); padding: 0.85rem 1rem; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 60; }
    .mobile-brand { font-family: var(--font-heading); font-weight: 800; font-size: 0.85rem; letter-spacing: 0.05em; }
    .mobile-brand span { color: var(--color-accent); }
    .hamburger-btn { width: 36px; height: 36px; border: 1px solid var(--color-border); border-radius: var(--radius); background: transparent; color: var(--color-text); display: flex; align-items: center; justify-content: center; }
    .hamburger-btn svg { width: 18px; height: 18px; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; }
      .mobile-header { display: flex; }
      .topbar { display: none; }
      .user-row { grid-template-columns: auto 1fr auto; }
      .user-row .role-badge { display: none; }
    }
  
  body, .header, header, .footer, footer, main, section, article,
  .nav-mobile, .sidebar, .topbar, .card, .pilar, .podcast-card,
  .episode-card, .platform-pill, .radio__player, .radio-controls,
  .submarca-card, .valor-item, .article-card, .login-card {
    transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  }
  input, textarea, select {
    transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  }
  </style>
  <script>(function(){if(localStorage.getItem('crono-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');})();</script>
</head>
<body>
<div class="app">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-name">Crono <span>Sport</span> Media</div>
      <div class="sidebar-brand-sub">Panel de Administración</div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Contenido</span>
      <button class="nav-item" onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <button class="nav-item" onclick="window.location.href='editor.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Nuevo artículo
      </button>
      <span class="nav-section-label">Sistema</span>
      <button class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Usuarios
      </button>
      <a class="nav-item" href="https://cronossportmedia.github.io" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Ver sitio
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="userInitial">?</div>
        <div>
          <div class="user-name" id="userName">—</div>
          <div class="user-role" id="userRoleEl">—</div>
        </div>
      </div>
      <button class="btn-logout" id="btnLogout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="mobile-header">
      <div class="mobile-brand">Crono <span>Sport</span> Media</div>
      <button class="hamburger-btn" id="hamburgerBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </header>
    <div class="topbar">
      <div class="topbar-title">Gestión de usuarios</div>
      <button id="theme-toggle" aria-label="Cambiar a modo oscuro" style="width:36px;height:36px;border-radius:50%;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,border-color .2s;flex-shrink:0;">
          <span class="icon-sun"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
          <span class="icon-moon" style="display:none;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        </button>
      <div id="topbarActions"></div>
    </div>
    <div class="page-body">
      <div class="table-wrap">
        <div class="table-header">
          <span class="table-header-title">Usuarios del sistema</span>
          <div id="tableHeaderActions"></div>
        </div>
        <div id="usersList">
          <div class="loading-state"><div class="loading-spinner"></div><p>Cargando usuarios...</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="userModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Nuevo usuario</div>
    <div class="field-group">
      <label class="field-label" for="mEmail">Email <span class="required">*</span></label>
      <input class="field-input" type="email" id="mEmail" placeholder="usuario@ejemplo.com">
      <div class="field-error" id="errEmail">Email obligatorio.</div>
    </div>
    <div class="field-group">
      <label class="field-label" for="mName">Nombre para mostrar <span class="required">*</span></label>
      <input class="field-input" type="text" id="mName" placeholder="Nombre Apellido">
      <div class="field-error" id="errName">Nombre obligatorio.</div>
    </div>
    <div class="field-group">
      <label class="field-label" for="mRole">Rol <span class="required">*</span></label>
      <select class="field-select" id="mRole">
        <option value="">— Selecciona —</option>
        <option value="super_admin">Super Admin</option>
        <option value="editor_jefe">Editor Jefe</option>
        <option value="reportero">Reportero</option>
        <option value="colaborador">Colaborador</option>
      </select>
      <div class="field-error" id="errRole">Selecciona un rol.</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-full-modal" id="btnCancelModal">Cancelar</button>
      <button class="btn btn-primary btn-full-modal" id="btnSaveUser">
        <div class="btn-spinner"></div>
        <span class="btn-label">Guardar</span>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { auth, db } from "../js/firebase-config.js";
  import { onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    collection, onSnapshot, doc, getDoc, updateDoc, setDoc, serverTimestamp, query, orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const ENABLE_CREATE_USER = false;

  let currentUser = null;
  let editingUid  = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.replace('index.html'); return; }
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists() || !snap.data().active || snap.data().role !== 'super_admin') {
      window.location.replace('dashboard.html'); return;
    }
    currentUser = { uid: user.uid, ...snap.data() };
    document.getElementById('userInitial').textContent = (currentUser.display_name || 'U')[0].toUpperCase();
    document.getElementById('userName').textContent    = currentUser.display_name || user.email;
    document.getElementById('userRoleEl').textContent  = 'Super Admin';

    if (ENABLE_CREATE_USER) {
      const btnHtml = `<button class="btn btn-primary" id="btnNewUser">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span class="btn-label">Nuevo usuario</span>
      </button>`;
      document.getElementById('topbarActions').innerHTML     = btnHtml;
      document.getElementById('tableHeaderActions').innerHTML = btnHtml;
      document.getElementById('topbarActions').querySelector('#btnNewUser')
        .addEventListener('click', () => openModal(null));
      document.getElementById('tableHeaderActions').querySelector('#btnNewUser')
        .addEventListener('click', () => openModal(null));
    }

    loadUsers();
  });

  function loadUsers() {
    const q = query(collection(db, 'users'), orderBy('created_at', 'asc'));
    onSnapshot(q, (snap) => {
      const users = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
      renderUsers(users);
    });
  }

  function renderUsers(users) {
    if (!users.length) {
      document.getElementById('usersList').innerHTML = '<div class="loading-state"><p>No hay usuarios.</p></div>';
      return;
    }
    document.getElementById('usersList').innerHTML = users.map(u => `
      <div class="user-row">
        <div class="user-row-avatar">${(u.display_name || '?')[0].toUpperCase()}</div>
        <div>
          <div class="user-row-name">${esc(u.display_name || '—')}</div>
          <div class="user-row-email">${esc(u.email || '—')}</div>
        </div>
        <span class="role-badge role-${u.role}">${formatRole(u.role)}</span>
        <div class="row-actions">
          <div class="active-dot ${u.active ? 'on' : 'off'}" title="${u.active ? 'Activo' : 'Inactivo'}"></div>
          <button class="action-btn" data-action="edit" data-uid="${u.uid}" title="Editar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          ${u.uid !== currentUser.uid ? `
          <button class="action-btn ${u.active ? 'warn' : ''}" data-action="toggle" data-uid="${u.uid}" data-active="${u.active}" title="${u.active ? 'Desactivar' : 'Activar'}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${u.active
              ? '<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>'
              : '<polyline points="20 6 9 17 4 12"/>'
            }</svg>
          </button>` : ''}
        </div>
      </div>`).join('');

    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => handleAction(btn.dataset.action, btn.dataset.uid, btn.dataset.active));
    });
  }

  async function handleAction(action, uid, activeStr) {
    if (action === 'edit') { openModal(uid); return; }
    if (action === 'toggle') {
      const isActive = activeStr === 'true';
      const msg = isActive ? '¿Desactivar este usuario? No podrá iniciar sesión.' : '¿Activar este usuario?';
      if (!confirm(msg)) return;
      try {
        await updateDoc(doc(db, 'users', uid), { active: !isActive });
        showToast(isActive ? 'Usuario desactivado.' : 'Usuario activado.', 'success');
      } catch { showToast('Error al actualizar.', 'error'); }
    }
  }

  document.getElementById('btnCancelModal').addEventListener('click', closeModal);

  async function openModal(uid) {
    editingUid = uid;
    clearModalErrors();
    document.getElementById('modalTitle').textContent = uid ? 'Editar usuario' : 'Nuevo usuario';
    document.getElementById('mEmail').value   = '';
    document.getElementById('mName').value    = '';
    document.getElementById('mRole').value    = '';
    document.getElementById('mEmail').disabled = !!uid;

    if (uid) {
      const snap = await getDoc(doc(db, 'users', uid));
      if (snap.exists()) {
        const d = snap.data();
        document.getElementById('mEmail').value = d.email || '';
        document.getElementById('mName').value  = d.display_name || '';
        document.getElementById('mRole').value  = d.role || '';
      }
    }
    document.getElementById('userModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('userModal').classList.remove('open');
    editingUid = null;
  }

  document.getElementById('btnSaveUser').addEventListener('click', async () => {
    if (!validateModal()) return;
    const btn = document.getElementById('btnSaveUser');
    btn.disabled = true; btn.classList.add('loading');

    const email = document.getElementById('mEmail').value.trim();
    const name  = document.getElementById('mName').value.trim();
    const role  = document.getElementById('mRole').value;

    try {
      if (editingUid) {
        await updateDoc(doc(db, 'users', editingUid), { display_name: name, role });
        showToast('Usuario actualizado.', 'success');
      } else {
        const uid = 'pending_' + Date.now();
        await setDoc(doc(db, 'users', uid), {
          email,
          display_name: name,
          role,
          active:     false,
          created_at: serverTimestamp(),
          _pending:   true,
        });
        showToast('Perfil creado. Recuerda crear la cuenta en Firebase Auth Console y actualizar el UID.', 'success');
      }
      closeModal();
    } catch (err) {
      console.error(err); showToast('Error al guardar.', 'error');
    } finally {
      btn.disabled = false; btn.classList.remove('loading');
    }
  });

  function validateModal() {
    let ok = true;
    if (!document.getElementById('mEmail').value.trim()) { document.getElementById('errEmail').classList.add('visible'); ok = false; }
    else document.getElementById('errEmail').classList.remove('visible');
    if (!document.getElementById('mName').value.trim())  { document.getElementById('errName').classList.add('visible'); ok = false; }
    else document.getElementById('errName').classList.remove('visible');
    if (!document.getElementById('mRole').value)          { document.getElementById('errRole').classList.add('visible'); ok = false; }
    else document.getElementById('errRole').classList.remove('visible');
    return ok;
  }

  function clearModalErrors() {
    ['errEmail','errName','errRole'].forEach(id => document.getElementById(id).classList.remove('visible'));
  }

  document.getElementById('btnLogout').addEventListener('click', async () => {
    await signOut(auth); window.location.replace('index.html');
  });
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  document.getElementById('hamburgerBtn').addEventListener('click', () => {
    sidebar.classList.toggle('open'); overlay.classList.toggle('open');
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open'); overlay.classList.remove('open');
  });

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 4000);
  }
  function formatRole(r) { return { super_admin:'Super Admin', editor_jefe:'Editor Jefe', reportero:'Reportero', colaborador:'Colaborador' }[r] || r; }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
  <script>
  (function(){
    var html=document.documentElement;
    document.addEventListener("DOMContentLoaded",function(){
      var toggles=document.querySelectorAll("#theme-toggle,#theme-toggle-mobile");
      if(!toggles.length)return;
      function updateIcons(){
        var dark=html.getAttribute("data-theme")==="dark";
        toggles.forEach(function(t){
          t.querySelectorAll(".icon-sun").forEach(function(el){el.style.display=dark?"none":"block";});
          t.querySelectorAll(".icon-moon").forEach(function(el){el.style.display=dark?"block":"none";});
          t.setAttribute("aria-label",dark?"Cambiar a modo claro":"Cambiar a modo oscuro");
        });
      }
      toggles.forEach(function(t){
        t.addEventListener("click",function(){
          var dark=html.getAttribute("data-theme")==="dark";
          if(dark){html.removeAttribute("data-theme");localStorage.setItem("crono-theme","light");}
          else{html.setAttribute("data-theme","dark");localStorage.setItem("crono-theme","dark");}
          updateIcons();
        });
      });
      updateIcons();
    });
  })();
  </script>
</body>
