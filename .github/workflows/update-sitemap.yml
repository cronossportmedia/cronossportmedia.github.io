name: Update Sitemap

on:
  schedule:
    # Runs daily at 06:00 UTC (02:00 AM Venezuela time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: node scripts/generate-sitemap.js

      - name: Commit and push if changed
        run: |
          git diff --quiet sitemap.xml && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "chore(sitemap): auto-update with active events"
          git push
